<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Discord Server Status</title>
<style>
    body {
        background: #1e1e1e;
        font-family: Arial, sans-serif;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .widget {
        background: #2b2b2b;
        padding: 25px;
        border-radius: 12px;
        width: 350px;
        text-align: center;
        box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    .server-icon {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        margin-bottom: 15px;
        object-fit: cover;
        border: 3px solid #5865F2;
    }

    .status-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 6px;
    }

    .online { background: #43b581; }
    .offline { background: #f04747; }

    .invite-btn {
        margin-top: 20px;
        display: inline-block;
        padding: 10px 18px;
        background: #5865F2;
        color: white;
        border-radius: 8px;
        text-decoration: none;
        font-weight: bold;
        transition: 0.2s;
    }

    .invite-btn:hover {
        background: #4752C4;
    }
</style>
</head>
<body>

<div class="widget">
    <img id="serverIcon" class="server-icon" src="" alt="Server Icon">
    <h2 id="serverName">Loading...</h2>
    <p><span id="statusDot" class="status-dot offline"></span><span id="statusText">Checking...</span></p>
    <p id="memberCount">Members: ...</p>
    <a id="inviteBtn" class="invite-btn" href="https://discord.gg/yourdiscordinvite" target="_blank">Join Server</a>
</div>

<script>
const SERVER_ID = "1453496485286117579";

// Your custom image
const CUSTOM_IMAGE_URL = "https://i.imgur.com/PLqhtqy.jpeg";

async function loadStatus() {
    try {
        const res = await fetch(`https://discord.com/api/guilds/${SERVER_ID}/widget.json`);
        
        if (!res.ok) throw new Error("Widget disabled or server offline");

        const data = await res.json();

        document.getElementById("serverName").textContent = data.name;
        document.getElementById("memberCount").textContent = `Members online: ${data.presence_count}`;

        // Always use your custom image
        document.getElementById("serverIcon").src = CUSTOM_IMAGE_URL;

        document.getElementById("statusDot").className = "status-dot online";
        document.getElementById("statusText").textContent = "Online";

    } catch (err) {
        document.getElementById("serverName").textContent = "Server Offline";
        document.getElementById("memberCount").textContent = "Members: N/A";

        // Still use your custom image even when offline
        document.getElementById("serverIcon").src = CUSTOM_IMAGE_URL;

        document.getElementById("statusDot").className = "status-dot offline";
        document.getElementById("statusText").textContent = "Offline";
    }
}

loadStatus();
setInterval(loadStatus, 15000);
</script>

</body>
</html>
